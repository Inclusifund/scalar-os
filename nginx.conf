server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # tidy redirect: /os -> /os/
    location = /os { return 301 /os/; }

    # served under the /os sub-path (Dokploy routes /os here without stripping)
    location /os/ {
        rewrite ^/os/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    # also works if the path is stripped, or served at root
    location / {
        try_files $uri $uri/ /index.html;
    }
}
